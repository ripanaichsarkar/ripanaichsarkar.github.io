<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, Arial, sans-serif;
    background:#f5f5f5;
    color:#333;
}

header{
    background:#2F3C7E;
    color:white;
    text-align:center;
    padding:60px 20px;
}

header h1{
    font-size:42px;
    margin-bottom:10px;
}

header p{
    font-size:18px;
}

.buttons{
    margin-top:25px;
}

.btn{
    display:inline-block;
    padding:12px 25px;
    margin:8px;
    background:white;
    color:#2F3C7E;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
    transition:.25s;
}

.btn:hover{
    background:#FBEAEB;
}

.contact-info{
    margin-top:20px;
    font-size:18px;
}

.contact-info a{
    color:white;
    text-decoration:none;
}

.contact-info a:hover{
    text-decoration:underline;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:40px 20px;
}

.section-title{
    text-align:center;
    font-size:32px;
    color:#2F3C7E;
    margin-bottom:30px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
    gap:25px;
}

.gallery img{
    width:100%;
    display:block;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    transition:.25s;
}

.gallery img:hover{
    transform:scale(1.02);
}

.resume{
    margin-top:70px;
}

iframe{
    width:100%;
    height:1000px;
    border:none;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

footer{
    background:#2F3C7E;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:60px;
}

@media(max-width:600px){

.gallery{
    grid-template-columns:1fr;
}

header h1{
    font-size:32px;
}

.section-title{
    font-size:26px;
}

iframe{
    height:700px;
}

}

</style>
