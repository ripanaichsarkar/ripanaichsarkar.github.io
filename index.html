    box-sizing:border-box;

body{

header{
    background:#2F3C7E;

}

.container{
    max-width:1400px;
    margin:auto;
    padding:40px 20px;

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(450px,1fr));

}

.gallery a{
    display:block;
}

.gallery img{
    width:100%;
    display:block;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    transition:0.25s;
}

.gallery img:hover{
    transform:scale(1.02);
}

.resume{
    margin-top:60px;
}

iframe{
    width:100%;
    height:950px;
    border:none;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

footer{
    background:#2F3C7E;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
