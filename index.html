<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, Arial, sans-serif;
    background:#f5f5f5;
    color:#333;
}

header{
    background:#2F3C7E;
    color:#fff;
    text-align:center;
    padding:60px 20px;
}

header h1{
    font-size:42px;
    margin-bottom:10px;
}

header p{
    font-size:18px;
}

.buttons{
    margin-top:25px;
}

.btn{
    display:inline-block;
    padding:12px 24px;
    margin:8px;
    background:#fff;
    color:#2F3C7E;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
    transition:.25s;
}

.btn:hover{
    background:#FBEAEB;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:40px 20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
    gap:25px;
}

.gallery a{
    display:block;
}

.gallery img{
    width:100%;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    transition:.25s;
}

.gallery img:hover{
    transform:scale(1.02);
}

.resume{
    margin-top:60px;
}

iframe{
    width:100%;
    height:1000px;
    border:none;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

footer{
    background:#2F3C7E;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}

</style>

</head>
