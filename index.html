<title>Ripan Aich Sarkar | BI Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#f5f5f5;
    color:#333;
}

header{
    background:#2F3C7E;
    color:white;
    padding:50px 20px;
    text-align:center;
}

header h1{
    font-size:40px;
}

header p{
    margin-top:10px;
    font-size:18px;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:white;
    color:#2F3C7E;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

.btn:hover{
    background:#FBEAEB;
}

section{
    max-width:1400px;
    margin:auto;
    padding:40px 20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
    gap:25px;
}

.gallery img{
    width:100%;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    transition:.25s;
}

.gallery img:hover{
    transform:scale(1.02);
}

iframe{
    width:100%;
    height:900px;
    border:none;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

footer{
    background:#2F3C7E;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:40px;
}

</style>

</head>
