<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ripan Aich Sarkar | BI Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#f5f5f5;
    color:#333;
}

header{
    background:#2F3C7E;
    color:white;
    text-align:center;
    padding:60px 20px;
}

header h1{
    font-size:46px;
    margin-bottom:10px;
}

header p{
    font-size:20px;
}

.buttons{
    margin-top:30px;
}

.btn{
    display:inline-block;
    padding:14px 28px;
    margin:8px;
    background:white;
    color:#2F3C7E;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
}

.btn:hover{
    background:#FBEAEB;
    transform:translateY(-2px);
}

.container{
    max-width:1400px;
    margin:auto;
    padding:40px 20px;
}

.section-title{
    text-align:center;
    font-size:32px;
    color:#2F3C7E;
    margin-bottom:30px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
    gap:25px;
}

.gallery img{
    width:100%;
    display:block;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    transition:.3s;
}

.gallery img:hover{
    transform:scale(1.02);
}

.resume{
    margin-top:70px;
}

iframe{
    width:100%;
    height:1000px;
    border:none;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

/* CONTACT MODAL */

.modal{
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.55);
}

.modal-content{
    background:#fff;
    width:340px;
    max-width:90%;
    margin:10% auto;
    padding:30px;
    border-radius:12px;
    text-align:center;
    position:relative;
    animation:popup .25s ease;
}

@keyframes popup{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.close{
    position:absolute;
    right:18px;
    top:12px;
    font-size:30px;
    cursor:pointer;
    color:#555;
}

.close:hover{
    color:red;
}

.contact-btn{
    display:block;
    margin:18px 0;
    padding:15px;
    text-decoration:none;
    background:#2F3C7E;
    color:white;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.contact-btn:hover{
    background:#4456b5;
}

footer{
    background:#2F3C7E;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:60px;
}

@media(max-width:700px){

.gallery{
    grid-template-columns:1fr;
}

header h1{
    font-size:34px;
}

header p{
    font-size:17px;
}

.section-title{
    font-size:26px;
}

iframe{
    height:700px;
}

}

</style>

</head>

<body>

<header>

</a>

</div>

Power BI Dashboard Portfolio

<div class="gallery">

<script>

function openContact(){
    document.getElementById("contactModal").style.display="block";
}

function closeContact(){
    document.getElementById("contactModal").style.display="none";
}

window.onclick=function(event){

const modal=document.getElementById("contactModal");

if(event.target===modal){
modal.style.display="none";
}

}

</script>

</body>

</html>
